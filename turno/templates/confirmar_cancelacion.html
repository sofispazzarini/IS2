{% extends 'base.html' %}
{% block content %}
<section class="pt-32 pb-20 px-6 bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl border border-red-100 text-center">
        <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="alert-triangle" class="w-10 h-10"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">¿Confirmar cancelación?</h2>
        <p class="text-gray-500 mb-8">
            Estás por cancelar la clase de <strong>{{ clase.actividad.nombre }}</strong> con el profesor {{ clase.profesor.nombre }}. Esta acción no se puede deshacer.
        </p>
        
        <form method="POST" class="flex flex-col gap-3">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold transition-colors">
                Sí, cancelar clase
            </button>
            <a href="{% url 'lista_clases_admin' %}" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 py-3 rounded-xl font-bold transition-colors">
                Volver atrás
            </a>
        </form>
    </div>
</section>
{% endblock %}
