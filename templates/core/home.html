{% extends 'base.html' %}

        <div class="flex-1 fade-up">

            <p class="text-bordo-700 font-semibold tracking-wide uppercase text-sm mb-4">

            </p>

            <h1 class="font-heading text-4xl md:text-5xl lg:text-6xl font-bold text-gray-900 leading-tight mb-6">

                </span>

            </h1>

            </p>

            <div class="flex flex-wrap gap-4">

                <a href="{% url 'lista_clases' %}"
