{% extends 'base.html' %}

{% block title %}
Registro | SIRCA
{% endblock %}

{% block content %}

<section class="min-h-screen flex items-center justify-center px-6 py-32 bg-gray-50">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">

            <h1 class="font-heading text-4xl font-bold text-bordo-700 mb-3">
                Crear cuenta
            </h1>

            <p class="text-gray-500">
                Registrate para comenzar a reservar turnos
            </p>

        </div>

        <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">

            {% csrf_token %}

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Nombre
                </label>

                <input
                    type="text"
                    name="nombre"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3"
                    required
                >

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Apellido
                </label>

                <input
                    type="text"
                    name="apellido"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3"
                    required
                >

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Usuario
                </label>

                <input
                    type="text"
                    name="username"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3"
                    required
                >

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    DNI
                </label>

                <input
                    type="text"
                    name="dni"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3"
                    required
                >

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3"
                    required
                >

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Teléfono
                </label>

                <input
                    type="text"
                    name="telefono"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3"
                    required
                >

            </div>

            <div class="md:col-span-2">

                <label class="block text-sm font-semibold mb-2">
                    Contraseña
                </label>

                <input
                    type="password"
                    name="password"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3"
                    required
                >

            </div>

            <div class="md:col-span-2">

                <button
                    type="submit"
                    class="w-full btn-bordo py-3 rounded-xl font-semibold text-white"
                >

                    Crear cuenta

                </button>

            </div>

        </form>

        <p class="text-center text-sm text-gray-500 mt-6">

            ¿Ya tenés cuenta?

            <a href="{% url 'login' %}"
               class="text-bordo-700 font-semibold hover:underline">

                Iniciar sesión

            </a>

        </p>

    </div>

</section>

{% endblock %}
