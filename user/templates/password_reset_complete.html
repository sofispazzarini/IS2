{% extends 'base.html' %}

{% block title %} Contraseña Cambiada | SIRCA {% endblock %}

{% block content %}
<section class="pt-32 pb-20 px-6 bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-lg p-8 border border-gray-100 text-center">
        
        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        </div>

        <h1 class="font-heading text-3xl font-bold text-bordo-700 mb-2">
            ¡Todo listo!
        </h1>
        
        <p class="text-gray-500 text-sm mb-6">
            Tu contraseña ha sido restablecida con éxito. Ya podés iniciar sesión con tus nuevas credenciales.
        </p>

        <a href="/auth/login/" class="inline-block w-full bg-bordo-700 hover:bg-bordo-800 text-white py-3 rounded-xl font-semibold shadow-md transition-all active:scale-[0.98]">
            Iniciar sesión
        </a>
    </div>
</section>
{% endblock %}
