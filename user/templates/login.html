{% extends 'base.html' %}

{% block title %}
Iniciar Sesión | SIRCA
{% endblock %}

{% block content %}

<section class="min-h-screen flex items-center justify-center px-6 py-32 bg-gray-50">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">

            <h1 class="font-heading text-4xl font-bold text-bordo-700 mb-3">
                Bienvenido
            </h1>

            <p class="text-gray-500">
                Iniciá sesión para acceder a tu cuenta
            </p>

        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Correo Electrónico
                </label>
                <input
                    type="email"
                    name="email"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-bordo-700"
                    placeholder="Correo electrónico"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Contraseña
                </label>
                <input
                    type="password"
                    name="password"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-bordo-700"
                    placeholder="Contraseña"
                    required
                >
                
            </div>

            <button
                type="submit"
                class="w-full btn-bordo py-3 rounded-xl font-semibold text-white"
            >
                Iniciar sesión
            </button>

        </form>

        <p class="text-center text-sm text-gray-500 mt-6">

            ¿No tenés cuenta?

            <a href="{% url 'user:register' %}"
               class="text-bordo-700 font-semibold hover:underline">

                Registrate

            </a>

        </p>

    </div>

</section>

{% endblock %}
